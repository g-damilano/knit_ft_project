# Dropdown option lists for the Knit Grid Catalog GUI.
# Edit this file to add or modify options without changing code.
# Reload the app after editing.
#
# For "structure_ref", options can be grouped with a section header line
# starting with "---" — these headers appear in the dropdown but cannot
# be selected.

